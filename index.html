<!DOCTYPE html><html lang="he" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>bit - C9 UZAIR Deep Load</title><script src="https://cdn.tailwindcss.com"></script><style>
    body { background-color: #f7f9fc; font-family: -apple-system, system-ui, sans-serif; margin: 0; overflow: hidden; user-select: none; }
    
    /* App Sections - Initial Hidden (Achanak load style) */
    .app-part { display: none; }
    .show-part { display: block !important; }

    .app-viewport { width: 100%; max-width: 500px; margin: 0 auto; min-height: 100vh; background: #f7f9fc; position: relative; }
    
    /* UI Styling */
    .balance-box { padding: 70px 20px 40px; text-align: center; }
    .balance-amount { font-size: 85px; font-weight: 400; color: #1c1c1e; line-height: 1; }
    .currency-symbol { font-size: 35px; vertical-align: middle; margin-left: 8px; }

    .actions-grid { display: flex; justify-content: center; gap: 35px; margin-bottom: 40px; }
    .action-circle { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0,0,0,0.06); font-size: 28px; color: white; }
    
    .activity-card { background: white; border-radius: 28px; margin: 0 15px; padding: 25px; box-shadow: 0 2px 12px rgba(0,0,0,0.03); min-height: 280px; }
    .trans-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

    /* Spinner */
    #loader { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 2000; }
    .spinner { width: 50px; height: 50px; border: 5px solid #f3f3f3; border-top: 5px solid #6c33f2; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Error Modal */
    .error-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 3000; padding: 20px; }
    .error-modal { background: white; border-radius: 30px; width: 100%; max-width: 340px; padding: 40px 20px; text-align: center; }
    .btn-retry { background: #6c33f2; color: white; width: 100%; padding: 18px; border-radius: 18px; font-weight: 800; border: none; font-size: 18px; margin-top: 25px; cursor: pointer; }

    /* BIG SIGNATURE - All Dark */
    .sig-area { margin-top: 30px; padding-top: 25px; border-top: 2px solid #f1f5f9; color: #000; }
    .sig-main { font-size: 26px; font-weight: 900; margin-bottom: 5px; }
    .sig-line { font-size: 19px; font-weight: 800; margin-bottom: 3px; }

    /* Crash State */
    .is-crashed { filter: blur(10px); opacity: 0.4; pointer-events: none; }
</style></head><body>

    <div id="app-body" class="app-viewport is-crashed">
        <div id="p1" class="app-part balance-box">
            <p class="text-gray-400 text-sm mb-2">היתרה שלך</p>
            <div class="balance-amount"><span class="currency-symbol">₪</span>389</div>
        </div>

        <div id="p2" class="app-part actions-grid">
            <div class="action-circle bg-[#f62d5d]">↗</div>
            <div class="action-circle bg-[#00e0ff]">↙</div>
            <div class="action-circle bg-white border border-gray-100 text-gray-200">...</div>
        </div>

        <div id="p3" class="app-part activity-card">
            <div class="flex justify-between items-center mb-6 text-gray-300 text-xs font-bold">
                📁 <span>פעילויות אחרונה</span>
            </div>
            <div class="trans-row">
                <span class="text-red-500 font-bold">- ₪33</span>
                <div class="text-right flex-1 px-3"><p class="font-bold text-sm">טל ציון</p></div>
                <div class="w-10 h-10 bg-gray-100 rounded-full"></div>
            </div>
            <div class="trans-row">
                <span class="text-green-600 font-bold">+ ₪190</span>
                <div class="text-right flex-1 px-3"><p class="font-bold text-sm">שובל חזן</p></div>
                <div class="w-10 h-10 bg-gray-100 rounded-full"></div>
            </div>
        </div>
    </div>

    <div id="loader"><div class="spinner"></div></div>

    <div id="error-screen" class="error-overlay">
        <div class="error-modal">
            <div class="w-12 h-12 bg-red-100 text-red-500 rounded-full flex items-center justify-center text-2xl font-bold mx-auto mb-4">!</div>
            
            <h2 class="text-2xl font-black mb-2">שגיאת מערכת קריטית</h2>
            <p class="text-sm text-gray-500 leading-tight mb-4 font-bold">
                החיבור לשרת המרכזי הופסק. הגישה למסד הנתונים חסומה. כשל במערכת (503).
            </p>
            <p class="text-[10px] font-mono text-gray-300 uppercase tracking-tighter mb-4">
                Error_Fatal: ISR_Central_Node_Dropped
            </p>
            
            <button class="btn-retry" onclick="nextStep()">נסה שוב</button>

            <div class="sig-area">
                <p class="sig-main">BY C9 UZAIR</p>
                <p class="sig-line">Pakistan Zindabad 🇵🇰</p>
                <p class="sig-line">Stand With Iran 🇮🇷</p>
            </div>
        </div>
    </div>

<script>
    let currentStep = 0;

    function nextStep() {
        const errorScreen = document.getElementById('error-screen');
        const loader = document.getElementById('loader');
        const appBody = document.getElementById('app-body');

        errorScreen.style.display = 'none';
        loader.style.display = 'block';

        setTimeout(() => {
            loader.style.display = 'none';
            appBody.classList.remove('is-crashed');
            currentStep++;

            if(currentStep === 1) {
                document.getElementById('p1').classList.add('show-part');
                setTimeout(crash, 2000);
            }
            else if(currentStep === 2) {
                document.getElementById('p1').classList.add('show-part');
                document.getElementById('p2').classList.add('show-part');
                setTimeout(crash, 2000);
            }
            else if(currentStep === 3) {
                document.getElementById('p1').classList.add('show-part');
                document.getElementById('p2').classList.add('show-part');
                document.getElementById('p3').classList.add('show-part');
                setTimeout(() => {
                    crash();
                    currentStep = 0; 
                    resetUI();
                }, 3500);
            }
        }, 1500);
    }

    function crash() {
        document.getElementById('app-body').classList.add('is-crashed');
        document.getElementById('error-screen').style.display = 'flex';
    }

    function resetUI() {
        setTimeout(() => {
            document.querySelectorAll('.app-part').forEach(el => el.classList.remove('show-part'));
        }, 500);
    }
</script></body></html>
