<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_UZAIR_STRIKE_V6</title>
    <style>
        :root { --accent: #00d4ff; --bg: #050608; --panel: #0f1218; --text: #8a929e; --border: #1a1e23; --success: #00ff88; --warn: #ffcc00; --err: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        
        body { 
            background: var(--bg); color: var(--text); 
            height: 100vw; width: 100vh; overflow: hidden; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg); transform-origin: center;
        }

        /* --- NEW LOADING STYLE --- */
        #global-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spin-char { font-size: 60px; color: var(--accent); animation: rotate 0.8s linear infinite; display: inline-block; font-weight: bold; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        #login-screen, #infra-screen, #sqli-screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 10px; }
        .active { display: flex !important; }

        .terminal-box { flex: 1.2; background: #000; border: 1px solid var(--border); padding: 20px 30px; font-size: 15px; color: #fff; overflow-y: auto; line-height: 1.6; box-shadow: inset 0 0 20px #000; }
        .side-ctrl { flex: 1; display: flex; flex-direction: column; gap: 8px; overflow-y: auto; }
        .input-box { background: var(--panel); border: 1px solid var(--border); padding: 10px; }
        input { width: 100%; background: #000; border: 1px solid #333; color: var(--success); padding: 12px; font-size: 15px; outline: none; }

        .btn { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent); color: var(--accent); padding: 18px 5px; cursor: pointer; text-transform: uppercase; font-size: 13px; font-weight: 900; transition: 0.2s; }
        .btn:active { transform: scale(0.95); background: var(--accent); color: #000; }
        .btn-warn { border-color: var(--warn); color: var(--warn); }
        .btn-err { border-color: var(--err); color: var(--err); }

        .header { font-size: 14px; font-weight: 900; color: #fff; padding: 5px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; margin-bottom: 10px; }
        .footer { font-size: 10px; text-align: center; color: #333; letter-spacing: 4px; margin-top: 5px; font-weight: bold; }

        @media screen and (orientation: landscape) { body { height: 100vh; width: 100vw; transform: none; top: 0; left: 0; } }
    </style>
</head>
<body onload="startApp()">

    <div id="global-loader">
        <span class="spin-char">)</span>
        <p id="loader-text" style="margin-top:20px; font-size:10px; color:var(--accent); letter-spacing:3px; font-weight:bold;"></p>
    </div>

    <div id="login-screen" style="justify-content:center; align-items:center;">
        <div style="width:400px; padding:30px; border:2px solid var(--accent); background:var(--panel); text-align:center;">
            <h1 style="color:#fff;">C9_UZAIR_STRIKE</h1>
            <input type="password" id="passkey" placeholder="SECURE ACCESS KEY" style="text-align:center; margin:20px 0;">
            <button class="btn" style="width:100%" onclick="login()">BOOT CORE</button>
        </div>
    </div>

    <div id="infra-screen">
        <div class="header"><span>SYSTEM_UPLINK // <span id="stat" style="color:var(--err)">OFFLINE</span></span><span>DEV: C9 UZAIR</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="infra-log">> Awaiting RDP Tunnel...</div>
            <div class="side-ctrl">
                <div class="input-box"><label>REMOTE_IP</label><input type="text" id="ip" value="162.251.10.92"></div>
                <button class="btn" id="b1" onclick="runInfra(1)">PING NODE</button>
                <button class="btn" id="b2" onclick="runInfra(2)">LINK RSA-4096</button>
                <button class="btn btn-err" style="margin-top:auto;" onclick="trySwitch()">INJECT SQLi MODULE</button>
            </div>
        </div>
        <div class="footer">MADE BY C9 UZAIR</div>
    </div>

    <div id="sqli-screen">
        <div class="header"><span style="color:var(--warn)">[!] MODULE: DATABASE_INJECTION</span><span>STATION: C9_UZAIR_SQLi</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="sqli-log">
                <span style="color:var(--warn)">[!] SQLMAP FRAMEWORK INITIALIZED.</span><br>
                > Target: https://api.internal-db.com/user?id=1
            </div>
            <div class="side-ctrl">
                <button class="btn btn-warn" id="s1" onclick="sqliAction(1)">[1] TEST VULNERABILITY</button>
                <button class="btn btn-warn" id="s2" onclick="sqliAction(2)">[2] BYPASS WAF</button>
                <button class="btn btn-warn" id="s3" onclick="sqliAction(3)">[3] DUMP TABLES</button>
                <button class="btn btn-err" id="repair-btn" style="display:none;" onclick="repairSystem()">[!] REPAIR DB_ERROR</button>
                <button class="btn btn-err" style="margin-top:auto;" onclick="location.reload()">TERMINATE</button>
            </div>
        </div>
        <div class="footer">DESIGNED BY C9 UZAIR // V6.0</div>
    </div>

<script>
    let isLinked = false;
    let isPinged = false;
    const wait = ms => new Promise(r => setTimeout(r, ms));

    // SHOW LOADING HELPER
    async function showLoading(msg, duration) {
        const loader = document.getElementById('global-loader');
        document.getElementById('loader-text').innerText = msg;
        loader.style.display = 'flex';
        await wait(duration);
        loader.style.display = 'none';
    }

    // STARTUP LOADING
    async function startApp() {
        await showLoading("INITIALIZING SYSTEM...", 3000);
        document.getElementById('login-screen').classList.add('active');
    }

    async function login() {
        if(document.getElementById('passkey').value === "C9") {
            await showLoading("AUTHORIZING...", 2500);
            document.getElementById('login-screen').classList.remove('active');
            document.getElementById('infra-screen').classList.add('active');
        } else { alert("DENIED."); }
    }

    async function trySwitch() {
        const log = document.getElementById('infra-log');
        if(!isLinked) {
            log.innerHTML += `<br><span style="color:var(--err)">[!] ERROR: INFRASTRUCTURE_OFFLINE</span>`;
        } else {
            await showLoading("INJECTING SQLi MODULE...", 2500);
            document.getElementById('infra-screen').classList.remove('active');
            document.getElementById('sqli-screen').classList.add('active');
        }
    }

    async function runInfra(s) {
        const log = document.getElementById('infra-log');
        if(s===1) {
            log.innerHTML += `<br>> Pinging ${document.getElementById('ip').value}...`;
            await wait(1500);
            log.innerHTML += `<br><span style="color:var(--success)">> Node Responsive.</span>`;
            isPinged = true;
        } else {
            if(!isPinged) log.innerHTML += `<br><span style="color:var(--err)">> ERROR: PING_REQUIRED</span>`;
            else {
                log.innerHTML += `<br>> Linking RSA...`;
                await wait(2000);
                log.innerHTML += `<br><span style="color:var(--accent)">> [SUCCESS] LINK_STABLE.</span>`;
                isLinked = true;
                document.getElementById('stat').innerText = "ONLINE";
                document.getElementById('stat').style.color = "var(--success)";
            }
        }
        log.scrollTop = log.scrollHeight;
    }

    async function sqliAction(opt) {
        const log = document.getElementById('sqli-log');
        if(opt === 1) {
            log.innerHTML += `<br>> Testing injection points...`;
            await wait(1500);
            log.innerHTML += `<br><span style="color:var(--err)">[CRITICAL ERROR] SQL_SYNTAX_BLOCKED_BY_FIREWALL</span>`;
            log.innerHTML += `<br><span style="color:var(--warn)">> System halted. Manual repair needed.</span>`;
            document.getElementById('repair-btn').style.display = 'block';
        } else if(opt === 2) {
            log.innerHTML += `<br>> Injecting Polyglot Payloads...`;
            await wait(2000);
            log.innerHTML += `<br><span style="color:var(--success)">> WAF Bypassed. Connection: Tunneled.</span>`;
        } else if(opt === 3) {
            log.innerHTML += `<br>> Dumping 'Users' table...`;
            await wait(2500);
            log.innerHTML += `<br><span style="color:var(--success)">> Found: [Admin] | [Pass: hash_c9_uzair]</span>`;
            log.innerHTML += `<br><span style="color:var(--accent)">> DATABASE_BREACH_COMPLETE.</span>`;
        }
        log.scrollTop = log.scrollHeight;
    }

    async function repairSystem() {
        const log = document.getElementById('sqli-log');
        log.innerHTML += `<br><span style="color:var(--accent)">> C9_UZAIR: Re-routing via Hex-Encoder...</span>`;
        await wait(2000);
        log.innerHTML += `<br><span style="color:var(--success)">> System Repaired. Vulnerability unlocked.</span>`;
        document.getElementById('repair-btn').style.display = 'none';
    }
</script>
</body>
</html>
