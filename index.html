<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_HARD_LINK_V1.8</title>
    <style>
        :root { --accent: #00d4ff; --bg: #050608; --panel: #0f1218; --text: #8a929e; --border: #1e242d; --err: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', 'Fira Code', monospace; }
        
        /* FORCE LANDSCAPE LOCK */
        body { 
            background: var(--bg); color: var(--text); 
            height: 100vw; width: 100vh; overflow: hidden; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg); transform-origin: center;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; padding: 15px; }

        .screen { display: none; flex-direction: column; height: 100%; gap: 15px; }
        .active-screen { display: flex !important; }

        .terminal-box { flex: 1; background: #020305; border: 1px solid var(--border); padding: 12px; font-size: 10px; color: #57606f; overflow-y: auto; line-height: 1.4; border-radius: 2px; }
        .input-group { background: var(--panel); border: 1px solid var(--border); padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        
        label { font-size: 9px; color: var(--accent); text-transform: uppercase; display: block; margin-bottom: 5px; }
        input { width: 100%; background: #000; border: 1px solid #222; color: #fff; padding: 8px; font-size: 11px; outline: none; }
        
        .btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 12px; cursor: pointer; text-transform: uppercase; font-size: 10px; font-weight: bold; transition: 0.3s; }
        .btn:disabled { border-color: #222; color: #222; opacity: 0.5; }
        .btn-active { background: var(--accent); color: #000; }

        .loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 40px; height: 40px; border: 3px solid #111; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .blink { animation: blinker 1.5s infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        @media screen and (orientation: landscape) { body { height: 100vh; width: 100vw; transform: none; top: 0; left: 0; } }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div id="loader-text" style="margin-top:15px; font-size:10px; color:var(--accent);" class="blink">NEGOTIATING_UPLINK...</div>
    </div>

    <div class="app-container">

        <div id="scr-1" class="screen active-screen">
            <h4 style="font-size:11px; color:#fff;">[STAGE_01] REMOTE_INFRASTRUCTURE_CONFIGURATION</h4>
            <div class="input-group">
                <div><label>Server Uplink IP</label><input type="text" value="162.251.10.92"></div>
                <div><label>SSH Port</label><input type="text" value="22"></div>
                <div><label>Encryption Protocol</label><input type="text" value="RSA-4096 / AES-GCM" readonly></div>
                <div><label>RDP Cluster Node</label><input type="text" value="FRA-NODE-09" readonly></div>
            </div>
            <div class="terminal-box" id="log-1">> Awaiting manual configuration...</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" id="b1" onclick="runStep1(1)">TEST SERVER PING</button>
                <button class="btn" id="b2" onclick="runStep1(2)" disabled>GENERATE RSA_KEYS</button>
                <button class="btn" id="b3" onclick="runStep1(3)" disabled>ESTABLISH SSH_LINK</button>
                <button class="btn btn-active" id="next-1" style="display:none; flex:1;" onclick="goTo(2)">ACCESS COMMAND_CENTER</button>
            </div>
        </div>

        <div id="scr-2" class="screen">
            <h4 style="font-size:11px; color:#fff;">[STAGE_02] HARDWARE_ABSTRACTION_LAYER</h4>
            <div style="display:grid; grid-template-columns: 250px 1fr; gap:15px; flex:1;">
                <div style="background:var(--panel); border:1px solid var(--border); padding:15px; display:flex; flex-direction:column; gap:10px;">
                    <div style="width:100%; aspect-ratio:1/1; border:1px solid #1a1a1a; border-radius:50%; position:relative; overflow:hidden;">
                        <div style="width:50%; height:1px; background:var(--accent); position:absolute; top:50%; left:50%; transform-origin:left; animation: rotate 4s linear infinite;"></div>
                    </div>
                    <button class="btn" id="mount-btn" onclick="runStep2(1)">MOUNT wlan0mon</button>
                    <button class="btn" id="scan-btn" onclick="runStep2(2)" disabled>INITIALIZE SCAN</button>
                </div>
                <div class="terminal-box" id="target-list"><p style="text-align:center; margin-top:100px; opacity:0.3;">[ HARDWARE NOT DETECTED ]</p></div>
            </div>
        </div>

        <div id="scr-3" class="screen">
            <h4 style="font-size:11px; color:#fff;">[STAGE_03] DISTRIBUTED_GPU_CRACKING</h4>
            <div class="terminal-box" id="log-3">> Handshake Captured: C9_PRO_PACKET.cap</div>
            <div class="input-group">
                <button class="btn" id="d1" onclick="runStep3(1)">ALLOCATE CUDA_CORES</button>
                <button class="btn" id="d2" onclick="runStep3(2)" disabled>START BRUTE-FORCE</button>
            </div>
            <div id="crack-status" style="display:none; padding:20px; background:#000; border:1px solid var(--border);">
                <div style="font-size:10px; display:flex; justify-content:space-between; margin-bottom:5px;"><span>SPEED: 21.4M p/s</span><span id="p-val">0%</span></div>
                <div style="width:100%; height:4px; background:#111;"><div id="p-bar" style="width:0%; height:100%; background:var(--accent); transition:0.3s;"></div></div>
            </div>
        </div>

    </div>

<script>
    const wait = ms => new Promise(res => setTimeout(res, ms));
    const loader = document.getElementById('loader');
    const loadText = document.getElementById('loader-text');

    async function showLoading(text, time) {
        loader.style.display = 'flex';
        loadText.innerText = text;
        await wait(time);
        loader.style.display = 'none';
    }

    async function writeLog(id, msg, color="#57606f") {
        const b = document.getElementById(id);
        b.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
        b.scrollTop = b.scrollHeight;
    }

    async function runStep1(s) {
        if(s===1) {
            await showLoading("PINGING REMOTE SERVER...", 2000);
            writeLog('log-1', "Reply from 162.251.10.92: bytes=32 time=12ms TTL=54", "#fff");
            document.getElementById('b1').disabled = true; document.getElementById('b2').disabled = false;
        } else if(s===2) {
            await showLoading("GENERATING RSA-4096 PAIR...", 3000);
            writeLog('log-1', "Private Key Generated: [SHA-256 Fingerprint Active]", "#00d4ff");
            document.getElementById('b2').disabled = true; document.getElementById('b3').disabled = false;
        } else if(s===3) {
            await showLoading("ESTABLISHING SSH HANDSHAKE...", 4000);
            writeLog('log-1', "Tunnel Established via AES-256-GCM Encryption.", "#00ff88");
            document.getElementById('b3').disabled = true; document.getElementById('next-1').style.display = 'block';
        }
    }

    function goTo(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(`scr-${n}`).classList.add('active-screen');
    }

    async function runStep2(s) {
        if(s===1) {
            await showLoading("MOUNTING REMOTE WIRELESS INTERFACE...", 3000);
            writeLog('target-list', "Driver: rtl8812au mounted successfully.", "#00d4ff");
            document.getElementById('mount-btn').disabled = true; document.getElementById('scan-btn').disabled = false;
        } else if(s===2) {
            await showLoading("SCANNING AIRWAVES...", 5000);
            document.getElementById('target-list').innerHTML = `
                <div style="background:#111; border:1px solid #222; padding:15px; display:flex; justify-content:space-between; cursor:pointer;" onclick="goTo(3)">
                    <div><b>C9_ENTERPRISE_SECURE</b><br><small>BSSID: 00:AF:E2:91 [WPA2]</small></div>
                    <div style="color:var(--accent)">-38dBm</div>
                </div>`;
        }
    }

    async function runStep3(s) {
        if(s===1) {
            await showLoading("SYNCING WITH GPU CLUSTER...", 3000);
            writeLog('log-3', "Nodes Allocated: NVIDIA_A100_NODE_FRA", "#00d4ff");
            document.getElementById('d1').disabled = true; document.getElementById('d2').disabled = false;
        } else if(s===2) {
            document.getElementById('d2').disabled = true;
            document.getElementById('crack-status').style.display = 'block';
            for(let i=0; i<=98; i+=2) {
                await wait(800);
                document.getElementById('p-bar').style.width = i + "%";
                document.getElementById('p-val').innerText = i + "%";
                if(i % 10 === 0) writeLog('log-3', `Testing_Segment_0x${i}... NO_MATCH`);
            }
            writeLog('log-3', "CRITICAL: Cluster Power Exhausted.", "#ff4757");
        }
    }
</script>
</body>
</html>
