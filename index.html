<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_UZAIR_STRIKE_V6</title>
    <style>
        :root { --accent: #00d4ff; --bg: #050608; --panel: #0f1218; --text: #8a929e; --border: #1a1e23; --success: #00ff88; --warn: #ffcc00; --err: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        
        body { 
            background: var(--bg); color: var(--text); 
            height: 100vw; width: 100vh; overflow: hidden; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg); transform-origin: center;
        }

        /* --- BOOT & ) LOADING ANIMATION --- */
        #boot-screen, #loader-overlay {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .spin-char { font-size: 60px; color: var(--accent); animation: rotate 0.8s linear infinite; display: inline-block; }
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        /* --- V6 ORIGINAL LAYOUT --- */
        .screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 10px; }
        .active { display: flex !important; }
        .terminal-box { flex: 1.2; background: #000; border: 1px solid var(--border); padding: 20px; font-size: 14px; color: #fff; overflow-y: auto; }
        .side-ctrl { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        .header { font-size: 14px; font-weight: 900; color: #fff; padding: 5px 30px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; margin-bottom: 10px; }
        .btn { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent); color: var(--accent); padding: 18px 5px; cursor: pointer; text-transform: uppercase; font-size: 13px; font-weight: 900; }
        .btn:active { transform: scale(0.95); background: var(--accent); color: #000; }
        .c9-glow { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        @media screen and (orientation: landscape) { body { height: 100vh; width: 100vw; transform: none; top: 0; left: 0; } }
    </style>
</head>
<body onload="startSystem()">

    <div id="boot-screen">
        <h1 class="c9-glow" style="letter-spacing: 10px;">C9 UZAIR STRIKE</h1>
        <div style="margin: 30px;"><span class="spin-char">)</span></div>
        <p style="font-size: 10px; letter-spacing: 3px;">BOOTING V6_CORE...</p>
    </div>

    <div id="loader-overlay" style="display: none;">
        <span class="spin-char">)</span>
        <p id="loader-msg" style="margin-top: 20px; font-size: 10px; color: var(--accent); letter-spacing: 2px;"></p>
    </div>

    <div id="scr-0" class="screen" style="justify-content:center; align-items:center;">
        <div style="width:400px; padding:30px; border:2px solid var(--accent); background:var(--panel); text-align:center;">
            <h1 class="c9-glow">SYSTEM LOGIN</h1>
            <input type="password" id="pass" placeholder="ENTER ACCESS KEY" style="width:100%; background:#000; border:1px solid #333; color:var(--success); padding:15px; text-align:center; margin:20px 0; outline:none;">
            <button class="btn" style="width:100%" onclick="goNext('AUTHORIZING...', 1)">BOOT CORE</button>
        </div>
    </div>

    <div id="scr-1" class="screen">
        <div class="header"><span>SYSTEM_UPLINK // <span id="stat" style="color:var(--err)">OFFLINE</span></span><span class="c9-glow">DEV: C9 UZAIR</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="l1">> Awaiting RDP Tunnel...</div>
            <div class="side-ctrl">
                <input type="text" value="162.251.10.92" style="background:var(--panel); border:1px solid var(--border); color:#fff; padding:12px;">
                <button class="btn" onclick="document.getElementById('l1').innerHTML += '<br>> Ping Success.'">PING NODE</button>
                <button class="btn" onclick="document.getElementById('l1').innerHTML += '<br>> RSA Linked.'; document.getElementById('stat').innerText='ONLINE'; document.getElementById('stat').style.color='var(--success)'">LINK RSA</button>
                <button class="btn" style="margin-top:auto; border-color:var(--err); color:var(--err);" onclick="goNext('INJECTING MODULE...', 2)">INJECT EVIL_TWIN</button>
            </div>
        </div>
    </div>

    <div id="scr-2" class="screen">
        <div class="header"><span>[+] ATTACK_MODULE: EVIL_TWIN</span><span class="c9-glow">STATION: C9_UZAIR_GHOST</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="l2">> MODULE READY.</div>
            <div class="side-ctrl">
                <button class="btn" onclick="document.getElementById('l2').innerHTML += '<br>> Scanning airwaves...<br>[+] PTCL-WIFI FOUND.'">[1] SCAN NEARBY WIFI</button>
                <button class="btn">[2] SELECT TARGET AP</button>
                <button class="btn">[3] ATTACK & DEAUTH</button>
                <button class="btn" style="margin-top:auto;" onclick="location.reload()">ABORT</button>
            </div>
        </div>
    </div>

<script>
    const wait = ms => new Promise(r => setTimeout(r, ms));

    async function startSystem() {
        await wait(3000); // 3 Sec initial boot
        document.getElementById('boot-screen').style.display = 'none';
        document.getElementById('scr-0').classList.add('active');
    }

    async function goNext(msg, next) {
        if(next === 1 && document.getElementById('pass').value !== "C9") { alert("WRONG KEY"); return; }
        
        const loader = document.getElementById('loader-overlay');
        document.getElementById('loader-msg').innerText = msg;
        loader.style.display = 'flex';
        
        await wait(2500); // 2.5 Sec ")" Loading
        
        loader.style.display = 'none';
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`scr-${next}`).classList.add('active');
    }
</script>
</body>
</html>
