<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Master Control Room - Live Merger</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #000; }
        #video-hidden { display: none; } /* Hidden raw camera */
        #render-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #ui-layer { position: relative; z-index: 2; width: 100%; height: 100%; }
        .overlay-container { position: absolute; touch-action: none; cursor: move; }
        .overlay-img { width: 100%; height: auto; pointer-events: none; }
        #status { position: absolute; top: 10px; left: 10px; z-index: 100; color: #0f0; background: rgba(0,0,0,0.7); padding: 5px; font-family: monospace; }
    </style>
</head>
<body>

    <div id="status">LIVE ID: <span id="peer-id">Connecting...</span></div>
    
    <video id="video-hidden" autoplay playsinline muted></video>
    <canvas id="render-canvas"></canvas>

    <div id="ui-layer">
        <div class="overlay-container" id="logo-overlay" style="top:20px; right:20px; width:120px;">
            <img src="IMG_4072.png" class="overlay-img">
        </div>
        <div class="overlay-container" id="headline-overlay" style="bottom:60px; left:20px; width:90%;">
            <img src="IMG_4070.png" class="overlay-img">
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

    <script>
        const video = document.getElementById('video-hidden');
        const canvas = document.getElementById('render-canvas');
        const ctx = canvas.getContext('2d');
        const peer = new Peer('uzair-news-studio');

        peer.on('open', id => document.getElementById('peer-id').innerText = id);

        async function init() {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: true });
            video.srcObject = stream;

            // Canvas size setup
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Draw everything on canvas (Camera + Overlays)
            function draw() {
                // 1. Draw Camera (Mirrored)
                ctx.save();
                ctx.scale(-1, 1);
                ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                ctx.restore();

                // 2. Draw Overlays
                const overlays = document.querySelectorAll('.overlay-container');
                overlays.forEach(div => {
                    const img = div.querySelector('img');
                    const rect = div.getBoundingClientRect();
                    ctx.drawImage(img, rect.left, rect.top, rect.width, rect.height);
                });

                requestAnimationFrame(draw);
            }
            draw();

            // Stream the Canvas instead of just the camera
            const canvasStream = canvas.captureStream(30); // 30 FPS
            
            peer.on('call', call => {
                call.answer(canvasStream);
            });
        }

        init();

        // Drag & Resize
        interact('.overlay-container').draggable({
            listeners: { move(event) {
                let target = event.target;
                let x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                let y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
            }}
        });
    </script>
</body>
</html>
