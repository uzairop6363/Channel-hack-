<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C9 UZAIR - System</title>
    <style>
        :root {
            --primary: #00ff41;
            --bg: #050505;
            --card: #111;
            --danger: #ff3e3e;
            --accent: #0088ff;
        }

        body {
            margin: 0;
            background-color: var(--bg);
            color: white;
            font-family: 'Consolas', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .app-container {
            width: 380px;
            background: var(--card);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #333;
            box-shadow: 0 0 25px rgba(0, 255, 65, 0.1);
            text-align: center;
        }

        h1 { color: var(--primary); letter-spacing: 4px; margin-bottom: 20px; }

        .input-box {
            width: 90%;
            padding: 12px;
            background: #000;
            border: 1px solid #444;
            color: var(--primary);
            margin-bottom: 15px;
            border-radius: 4px;
            text-align: center;
            font-size: 1.1rem;
        }

        #terminal {
            background: #000;
            height: 150px;
            text-align: left;
            padding: 10px;
            font-size: 0.85rem;
            overflow-y: auto;
            border: 1px solid #222;
            margin-bottom: 15px;
        }

        .status-area {
            height: 30px;
            margin: 10px 0;
            font-weight: bold;
            display: none; /* Initially Hidden */
        }

        .btn-group { display: flex; gap: 10px; }
        
        button {
            flex: 1;
            padding: 12px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            text-transform: uppercase;
            transition: 0.3s;
        }

        .btn-main { background: var(--primary); color: #000; }
        .btn-sec { background: #333; color: #fff; }
        .btn-login { background: var(--accent); color: white; display: none; width: 100%; }

        /* Second Screen Styles */
        #second-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            text-align: center;
            width: 320px;
        }

        .cost-msg {
            color: #ffcc00;
            margin-top: 20px;
            display: none;
            font-size: 1.2rem;
            border: 1px dashed #ffcc00;
            padding: 10px;
        }

        .line { margin: 4px 0; opacity: 0; animation: fadeIn 0.3s forwards; }
        @keyframes fadeIn { to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="app-container" id="main-app">
        <h1>C9 UZAIR</h1>
        <input type="text" id="phoneNum" placeholder="Enter Target Number">
        
        <div id="terminal">
            <div style="color: #555;">> System Ready...</div>
        </div>

        <div class="status-area" id="statusText"></div>

        <div class="btn-group" id="initial-btns">
            <button class="btn-main" onclick="startProcess()">Continue</button>
            <button class="btn-sec" onclick="location.reload()">Close</button>
        </div>

        <button class="btn-login" id="loginBtn" onclick="openSecondScreen()">Login to Dashboard</button>
    </div>

    <div id="second-screen">
        <div class="glass-card">
            <h2 style="color: var(--accent);">Access Granted</h2>
            <p style="color: #888;">Target Account:</p>
            <h3 id="displayNum" style="letter-spacing: 2px;"></h3>
            
            <button class="btn-main" style="width: 100%; margin-top: 20px;" id="nextBtn" onclick="showCost()">Next Step</button>
            
            <div class="cost-msg" id="costInfo">
                Server Cost 10$ <br> To Bypass 100k OTP
            </div>
            <br>
            <button class="btn-sec" onclick="location.reload()" style="font-size: 0.7rem;">Logout</button>
        </div>
    </div>

    <script>
        const terminal = document.getElementById('terminal');
        const statusArea = document.getElementById('statusText');
        const initialBtns = document.getElementById('initial-btns');
        const loginBtn = document.getElementById('loginBtn');
        const phoneInput = document.getElementById('phoneNum');

        function print(text, color = "white") {
            const div = document.createElement('div');
            div.className = 'line';
            div.style.color = color;
            div.innerHTML = `> ${text}`;
            terminal.appendChild(div);
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function startProcess() {
            const num = phoneInput.value;
            if (!num) return alert("Number enter kren!");

            initialBtns.style.opacity = "0.5";
            initialBtns.style.pointerEvents = "none";
            
            terminal.innerHTML = "";
            await wait(800); print("Connecting to secure tunnel...", "#0088ff");
            await wait(1500); print("Removing device links...", "white");
            await wait(2000); print("Loading bypass modules...", "white");
            await wait(1200); print("CRITICAL: Failed to bypass!", "#ff3e3e");
            await wait(1500); print("Retrying with proxy...", "#ffcc00");
            await wait(2000); print("Account Logged out ☑️", "#00ff41");
            await wait(1500); print("Bypassing for OTP...", "#00ff41");

            // After Simulation Finishes
            await wait(1000);
            statusArea.style.display = "block";
            statusArea.innerHTML = "100k OTP Need To Bypass This Account";
            statusArea.style.color = "#ff3e3e";
            
            await wait(2000);
            statusArea.innerHTML = "Success ☑️";
            statusArea.style.color = "#00ff41";
            
            // Swap Buttons
            initialBtns.style.display = "none";
            loginBtn.style.display = "block";
        }

        function openSecondScreen() {
            document.getElementById('main-app').style.display = "none";
            document.getElementById('second-screen').style.display = "flex";
            document.getElementById('displayNum').innerText = phoneInput.value;
        }

        function showCost() {
            document.getElementById('nextBtn').style.display = "none";
            document.getElementById('costInfo').style.display = "block";
        }

        function wait(ms) { return new Promise(res => setTimeout(res, ms)); }
    </script>
</body>
</html>
