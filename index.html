<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C9 UZAIR News Hack</title>
    
    <style>
        /* === 2. STYLE.CSS (Design) === */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }

        /* Front Camera Layer */
        #video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transform: scaleX(-1); /* Mirror effect for front camera */
        }

        #ui-layer {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
        }

        /* Draggable & Resizable Elements */
        .overlay-container {
            position: absolute;
            touch-action: none;
            user-select: none;
            display: inline-block;
        }

        #logo-overlay { top: 20px; right: 20px; width: 120px; }
        #headline-overlay { bottom: 60px; left: 50px; width: 85%; }

        .overlay-img {
            width: 100%; height: auto;
            display: block;
            pointer-events: none; /* Takay dragging mein masla na ho */
        }

        /* Resizer Handle (Corner pe touch point) */
        .resizer {
            width: 25px; height: 25px;
            background: rgba(0, 255, 0, 0.5); /* Green dot for resizing */
            position: absolute; right: 0; bottom: 0;
            cursor: nwse-resize;
            border-radius: 50%;
            border: 2px solid white;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>

    <div id="ui-layer">
        
        <div class="overlay-container" id="logo-overlay">
            <img src="logo.png" alt="Logo" class="overlay-img">
            <div class="resizer"></div>
        </div>

        <div class="overlay-container" id="headline-overlay">
            <img src="headline.png" alt="Headline" class="overlay-img">
            <div class="resizer"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <script>
        /* === 3. SCRIPT.JS (Logic) === */
        const video = document.getElementById('video');

        // Start Front Camera
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera Permission Denied! Please use HTTPS and allow camera.");
            }
        }
        startCamera();

        // Interaction Logic
        interact('.overlay-container')
          .draggable({
            listeners: {
              move (event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          })
          .resizable({
            edges: { right: true, bottom: true },
            listeners: {
              move (event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0);
                var y = (parseFloat(target.getAttribute('data-y')) || 0);

                target.style.width = event.rect.width + 'px';
                target.style.height = event.rect.height + 'px';
                target.style.transform = `translate(${x}px, ${y}px)`;
              }
            }
          });
    </script>
</body>
</html>
