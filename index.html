<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_UZAIR_FINAL_V8.1</title>
    <style>
        :root { --accent: #00d4ff; --bg: #050608; --panel: #0f1218; --text: #8a929e; --border: #1a1e23; --success: #00ff88; --warn: #ffcc00; --err: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        
        body { 
            background: var(--bg); color: var(--text); 
            height: 100vw; width: 100vh; overflow: hidden; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg); transform-origin: center;
        }

        /* --- LOADING OVERLAY --- */
        #global-loader {
            position: fixed; inset: 0; background: var(--bg); z-index: 9999;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        .spinner { width: 50px; height: 50px; border: 3px solid #111; border-top: 3px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .screen { position: fixed; inset: 0; display: none; flex-direction: column; padding: 10px; }
        .active { display: flex !important; }

        .terminal-box { flex: 1.2; background: #000; border: 1px solid var(--border); padding: 15px; font-size: 14px; color: #fff; overflow-y: auto; }
        .side-ctrl { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        /* WiFi Items Styling */
        .wifi-item { 
            background: rgba(0, 212, 255, 0.1); border: 1px solid #333; padding: 12px; cursor: pointer; 
            margin-top: 10px; color: var(--accent); font-weight: bold; text-align: left;
        }
        .wifi-selected { border-color: var(--success) !important; color: var(--success) !important; background: rgba(0, 255, 136, 0.1) !important; }

        .btn { background: rgba(0, 212, 255, 0.05); border: 2px solid var(--accent); color: var(--accent); padding: 16px; cursor: pointer; text-transform: uppercase; font-size: 12px; font-weight: 900; }
        .btn:disabled { opacity: 0.1; pointer-events: none; }

        .header { font-size: 13px; padding: 5px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .footer { font-size: 9px; text-align: center; color: #333; letter-spacing: 5px; padding: 5px; }
        .c9-glow { color: var(--accent); text-shadow: 0 0 10px var(--accent); }

        @media screen and (orientation: landscape) { body { height: 100vh; width: 100vw; transform: none; top: 0; left: 0; } }
    </style>
</head>
<body>

    <div id="global-loader">
        <div class="spinner"></div>
        <p id="loader-text" style="margin-top:15px; font-size:10px; color:var(--accent); letter-spacing:2px;">INITIALIZING...</p>
    </div>

    <div id="scr-0" class="screen active" style="justify-content:center; align-items:center;">
        <div style="width:380px; padding:40px; border:2px solid var(--accent); background:var(--panel); text-align:center;">
            <h2 class="c9-glow">C9_UZAIR_CORE</h2>
            <input type="password" id="key" placeholder="ACCESS KEY" style="width:100%; background:#000; border:1px solid #333; color:var(--success); padding:15px; text-align:center; margin:20px 0; outline:none;">
            <button class="btn" style="width:100%" onclick="showLoader('BOOTING SYSTEM...', 1)">LOGIN</button>
        </div>
    </div>

    <div id="scr-1" class="screen">
        <div class="header"><span>RDP_UPLINK</span><span class="c9-glow">C9 UZAIR</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="log-1">> Awaiting manual build...</div>
            <div class="side-ctrl">
                <button class="btn" onclick="runPing()">PING SERVER</button>
                <button class="btn" onclick="runRSA()">ESTABLISH RSA</button>
                <button class="btn" style="margin-top:auto; border-color:var(--err); color:var(--err);" onclick="showLoader('SYNCHRONIZING...', 2)">LAUNCH HACK</button>
            </div>
        </div>
    </div>

    <div id="scr-2" class="screen">
        <div class="header"><span>STRIKE_MODE_ACTIVE</span><span class="c9-glow">C9 UZAIR</span></div>
        <div style="display:flex; height:100%; gap:10px; overflow:hidden;">
            <div class="terminal-box" id="log-2">
                <span style="color:var(--success)">[+] TERMINAL_READY.</span><br>
                > Click 'SCAN TARGETS' to show networks.
                <div id="wifi-container" style="margin-top:10px;"></div>
            </div>
            <div class="side-ctrl">
                <button class="btn" onclick="scanWifi()">[1] SCAN TARGETS</button>
                <button class="btn" id="btn-h" disabled onclick="runHack()">[2] START HACK</button>
                <button class="btn" style="margin-top:auto;" onclick="location.reload()">TERMINATE</button>
            </div>
        </div>
    </div>

<script>
    let target = null;
    const wait = ms => new Promise(r => setTimeout(r, ms));

    async function showLoader(text, next) {
        if(next === 1 && document.getElementById('key').value !== "C9") { alert("WRONG KEY!"); return; }
        const loader = document.getElementById('global-loader');
        document.getElementById('loader-text').innerText = text;
        loader.style.display = 'flex';
        await wait(2500); 
        loader.style.display = 'none';
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(`scr-${next}`).classList.add('active');
    }

    async function runPing() { document.getElementById('log-1').innerHTML += `<br><span style="color:var(--success)">> Ping Success.</span>`; }
    async function runRSA() { document.getElementById('log-1').innerHTML += `<br><span style="color:var(--accent)">> RSA Link Established.</span>`; }

    async function scanWifi() {
        const log = document.getElementById('log-2');
        const container = document.getElementById('wifi-container');
        log.innerHTML = `<span style="color:var(--warn)">> Scanning nearby airwaves (Real-Time)...</span>`;
        await wait(2000);
        
        container.innerHTML = `<p style="font-size:11px; margin-bottom:5px;">AVAILABLE NETWORKS:</p>`;
        ["PTCL-BB-92", "C9_GUEST_SECURE", "TP-LINK_EXT"].forEach(n => {
            const d = document.createElement('div');
            d.className = "wifi-item";
            d.innerText = `[SCAN] ${n} -- PWR: -45dBm`;
            d.onclick = () => {
                document.querySelectorAll('.wifi-item').forEach(i => i.classList.remove('wifi-selected'));
                d.classList.add('wifi-selected');
                target = n;
                log.innerHTML += `<br><span style="color:var(--success)">> Target: ${n} Locked.</span>`;
                document.getElementById('btn-h').disabled = false;
            };
            container.appendChild(d);
        });
    }

    async function runHack() {
        const l = document.getElementById('log-2');
        document.getElementById('wifi-container').style.display = 'none';
        l.innerHTML += `<br><span style="color:var(--err)">> Deauthenticating ${target}...</span>`;
        await wait(3000);
        l.innerHTML += `<br><span style="color:var(--success)">> Handshake Captured! Cracking...</span>`;
        await wait(2000);
        l.innerHTML += `<br><br><span class="c9-glow" style="font-size:18px;">PASSWORD: uzair_admin_92</span>`;
    }
</script>
</body>
</html>
