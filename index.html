<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MCR PRO">
    
    <title>MCR PRO ADAPTIVE</title>
    <style>
        :root { --bg: #050505; --panel: #111; --danger: #ff0000; --pvw: #00ff00; --accent: #f1c40f; }
        
        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent;
            /* Prevents the toolbar from triggering on most clicks */
            touch-action: manipulation; 
        }
        
        body { 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden; /* Lock scroll to prevent bar popping */
            height: 100vh;
            /* New iOS Fix for height */
            height: 100svh; 
            display: flex;
            flex-direction: column;
        }

        /* Initial Loader */
        #app-loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spin { width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--danger); border-radius: 50%; animation: s 1s linear infinite; }
        @keyframes s { to { transform: rotate(360deg); } }

        .container { 
            display: flex; 
            flex-direction: column; 
            height: 100%;
            width: 100%;
            padding-bottom: env(safe-area-inset-bottom); /* iOS Notch/Bar Fix */
        }

        .header { height: 40px; background: #000; display: flex; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 2px solid #333; font-size: 12px; flex-shrink: 0; }

        .monitor-wall { 
            display: grid; 
            grid-template-columns: 220px 1fr; 
            gap: 10px; 
            padding: 10px;
            flex: 1;
            overflow: hidden;
        }
        
        .side-panel { display: grid; grid-template-rows: repeat(3, 1fr) 80px; gap: 8px; }
        .mon { background: #000; border: 1px solid #444; position: relative; overflow: hidden; border-radius: 4px; }
        .mon-tag { position: absolute; top: 0; left: 0; background: rgba(0,0,0,0.8); font-size: 10px; padding: 2px 8px; z-index: 5; font-weight: bold; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        .main-screens { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .big-mon { border: 4px solid #333; position: relative; aspect-ratio: 16/9; background: #000; border-radius: 6px; overflow: hidden; }
        .pvw-active { border-color: var(--pvw); }
        .pgm-active { border-color: var(--danger); }

        .console { 
            background: var(--panel); 
            padding: 15px; 
            display: grid; 
            grid-template-columns: 1.5fr 80px 1.2fr; 
            gap: 20px; 
            border-top: 2px solid #333;
            flex-shrink: 0;
        }

        .btn-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .mcr-btn { 
            height: 45px; 
            background: linear-gradient(#444, #222); 
            border: 1px solid #666; 
            color: #fff; 
            font-size: 10px; 
            font-weight: bold; 
            border-radius: 4px; 
            cursor: pointer;
        }
        .mcr-btn:active { background: #111; transform: scale(0.98); }

        .audio-mixer { display: flex; justify-content: space-around; align-items: center; background: #000; border-radius: 5px; padding: 10px; border: 1px solid #333; }
        .fader-track { width: 12px; height: 50px; background: #222; position: relative; border-radius: 10px; }
        .fader-knob { width: 22px; height: 10px; background: #888; position: absolute; left: -5px; bottom: 50%; border-radius: 2px; }

        .ticker-patti { position: absolute; bottom: 0; width: 100%; background: #900; height: 35px; border-top: 1px solid #fff; display: flex; align-items: center; overflow: hidden; }
        .ticker-text { white-space: nowrap; animation: move 12s linear infinite; font-weight: 900; font-size: 18px; color: #fff; padding-left: 100%; }
        @keyframes move { from { transform: translateX(0); } to { transform: translateX(-200%); } }

        .tbar-track { width: 35px; height: 100px; background: #000; border: 2px solid #444; border-radius: 20px; position: relative; margin: 0 auto; }
        .tbar-handle { width: 55px; height: 22px; background: #aaa; position: absolute; left: -12px; top: 0; border-radius: 4px; box-shadow: 0 4px 8px #000; }
    </style>
</head>
<body oncontextmenu="return false;"> <div id="app-loader">
        <div class="spin"></div>
        <p style="margin-top:20px; font-weight:bold;">LOCKING MCR ENGINE...</p>
    </div>

    <div class="container">
        <div class="header">
            <div style="color:var(--danger)">● LIVE MASTER CONTROL</div>
            <div id="clock" style="color:var(--accent); font-size:18px; font-weight:bold;">00:00:00</div>
            <div style="color:#666; font-size:10px;">ULTIMATE NO-BAR V4</div>
        </div>

        <div class="monitor-wall">
            <div class="side-panel">
                <div class="mon"><div class="mon-tag">DDR 1 (HOLD)</div><video id="vidDDR" muted playsinline></video></div>
                <div class="mon"><div class="mon-tag">LIVE FEED 2</div><video id="vidFeed2" muted loop playsinline></video></div>
                <div class="mon"><div class="mon-tag">SAT 3</div><video id="vidSat" muted loop playsinline src="https://www.w3schools.com/html/mov_bbb.mp4"></video></div>
                <div class="audio-mixer">
                    <div class="fader-track"><div class="fader-knob"></div></div>
                    <div class="fader-track"><div class="fader-knob" style="bottom: 80%;"></div></div>
                    <div class="fader-track"><div class="fader-knob" style="bottom: 30%;"></div></div>
                </div>
            </div>

            <div class="main-screens">
                <div class="big-mon pvw-active"><div class="mon-tag" style="background:var(--pvw); color:#000;">PREVIEW</div><video id="pvwVideo" muted playsinline></video></div>
                <div class="big-mon pgm-active">
                    <div class="mon-tag" style="background:var(--danger);">PROGRAM (LIVE)</div>
                    <video id="pgmVideo" playsinline></video>
                    <div class="ticker-patti"><div class="ticker-text" id="tickerUI">SYSTEM ONLINE • FULLSCREEN ACTIVE • </div></div>
                </div>
            </div>
        </div>

        <div class="console">
            <div class="bus-controls">
                <div class="btn-grid">
                    <button class="mcr-btn" onclick="document.getElementById('fileIn').click()">SELECT CLIP</button>
                    <button class="mcr-btn" style="background:var(--danger)" onclick="pushAction()">PUSH TO LIVE</button>
                    <button class="mcr-btn" onclick="alert('Voice Active')">VOICE</button>
                    <button class="mcr-btn" onclick="location.reload()">RESET</button>
                    <button class="mcr-btn">AUTO</button>
                    <button class="mcr-btn">CUT</button>
                    <button class="mcr-btn">BLACK</button>
                    <button class="mcr-btn" style="background:var(--pvw); color:#000;">SET PVW</button>
                </div>
            </div>

            <div style="text-align:center;">
                <div class="tbar-track"><div class="tbar-handle" id="tbar"></div></div>
            </div>

            <div class="cg-controls">
                <input type="text" id="cgInput" style="width:100%; padding:10px; background:#000; border:1px solid #444; color:var(--accent); margin-bottom:10px;" placeholder="Breaking News...">
                <button class="mcr-btn" style="width:100%; background:#0055ff;" onclick="updateCG()">PUSH GRAPHICS</button>
            </div>
        </div>
    </div>

    <input type="file" id="fileIn" hidden accept="video/*">

    <script>
        const vDDR = document.getElementById('vidDDR');
        const vFeed2 = document.getElementById('vidFeed2');
        const vPGM = document.getElementById('pgmVideo');
        const vPVW = document.getElementById('pvwVideo');
        const loader = document.getElementById('app-loader');
        let clipUrl = null;

        // 1. Initial Load
        window.onload = () => {
            setTimeout(() => {
                vFeed2.src = "video123.mp4"; 
                vFeed2.play().catch(()=>{});
                loader.style.display = "none";
            }, 3000);
        };

        // 2. Select Clip
        document.getElementById('fileIn').onchange = (e) => {
            const file = e.target.files[0];
            if(file) {
                clipUrl = URL.createObjectURL(file);
                vDDR.src = clipUrl;
                vDDR.play();
                vPVW.src = clipUrl;
                vPVW.play();
            }
        };

        // 3. PUSH Logic: Replay from 0 + Clear DDR
        function pushAction() {
            if(!clipUrl) return;
            vFeed2.src = clipUrl;
            vPGM.src = clipUrl;
            vFeed2.currentTime = 0;
            vPGM.currentTime = 0;
            vFeed2.play();
            vPGM.play();
            vDDR.src = "";
            vPVW.src = "";
            clipUrl = null;
        }

        // T-Bar Logic
        const handle = document.getElementById('tbar');
        handle.addEventListener('touchmove', (e) => {
            let rect = handle.parentElement.getBoundingClientRect();
            let y = e.touches[0].clientY - rect.top;
            if(y >= 0 && y <= 78) {
                handle.style.top = y + 'px';
                if(y > 70) pushAction();
            }
        }, {passive: true});

        // Clock & CG
        function updateCG() {
            const val = document.getElementById('cgInput').value;
            if(val) document.getElementById('tickerUI').innerText = "BREAKING NEWS: " + val.toUpperCase() + " • ";
        }
        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('en-GB'); }, 1000);

        // iPad Touch Permission
        document.body.addEventListener('touchstart', (e) => {
            [vDDR, vFeed2, vPGM, vPVW].forEach(v => v.play().catch(()=>{}));
        }, {once: true});
        
        // Final Fix: Stop the "Bounce" which triggers the bar
        document.addEventListener('touchmove', (e) => { if(e.touches.length > 1) e.preventDefault(); }, {passive: false});
    </script>
</body>
</html>
