<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C9 UZAIR News Hack Live</title>
    
    <style>
        /* DESIGN */
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; background: #000;
        }

        /* Front Camera Layer */
        #video {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover; z-index: 1;
            transform: scaleX(-1); /* Mirror effect */
        }

        #ui-layer {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
        }

        /* Draggable & Resizable Elements */
        .overlay-container {
            position: absolute;
            touch-action: none;
            user-select: none;
            display: inline-block;
            /* Border hataya taake real lage */
            border: none;
        }

        /* Default Positions */
        #logo-overlay { top: 20px; right: 20px; width: 120px; }
        #headline-overlay { bottom: 60px; left: 20px; width: 90%; }

        .overlay-img {
            width: 100%; height: auto;
            display: block;
            pointer-events: none; 
        }

        /* Invisible Resizer Handle */
        .resizer {
            width: 40px; /* Thora bara rakha hai taake touch karne mein asani ho */
            height: 40px;
            background: transparent; /* Bilkul gayab */
            position: absolute; 
            right: 0; 
            bottom: 0;
            cursor: nwse-resize;
            z-index: 10;
        }
    </style>
</head>
<body>

    <video id="video" autoplay playsinline></video>

    <div id="ui-layer">
        
        <div class="overlay-container" id="logo-overlay">
            <img src="IMG_4072.png" alt="Logo" class="overlay-img">
            <div class="resizer"></div>
        </div>

        <div class="overlay-container" id="headline-overlay">
            <img src="IMG_4070.png" alt="Headline" class="overlay-img">
            <div class="resizer"></div>
        </div>

    </div>

    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <script>
        /* LOGIC */
        const video = document.getElementById('video');

        // Front Camera Start
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera Error: Please use HTTPS and Allow Camera Permissions.");
            }
        }
        startCamera();

        // Interaction Logic (Drag and Resize)
        interact('.overlay-container')
          .draggable({
            listeners: {
              move (event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                var y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;

                target.style.transform = `translate(${x}px, ${y}px)`;
                target.setAttribute('data-x', x);
                target.setAttribute('data-y', y);
              }
            }
          })
          .resizable({
            edges: { right: true, bottom: true },
            listeners: {
              move (event) {
                var target = event.target;
                var x = (parseFloat(target.getAttribute('data-x')) || 0);
                var y = (parseFloat(target.getAttribute('data-y')) || 0);

                target.style.width = event.rect.width + 'px';
                target.style.height = event.rect.height + 'px';
                target.style.transform = `translate(${x}px, ${y}px)`;
              }
            }
          });
    </script>
</body>
</html>
