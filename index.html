<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>C9 UZAIR | MCR v21</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fira+Code:wght@700&family=Rajdhani:wght@700&display=swap');
        
        /* FIX: Screen ke andar fit rehne ke liye height/width lock */
        body { 
            background: #0f172a; 
            color: #38bdf8; 
            font-family: 'Rajdhani', sans-serif; 
            height: 100vh; 
            width: 100vw;
            overflow: hidden; 
            margin: 0; 
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .main-container { 
            width: 95%; 
            height: 90%; 
            background: #1e293b; 
            border: 3px solid #38bdf8; 
            display: flex; 
            flex-direction: column;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* BOLD INPUTS */
        input, textarea { 
            background: #000 !important; 
            border: 2px solid #334155 !important; 
            color: #fff !important; 
            font-size: 16px !important; 
            font-weight: bold;
            padding: 10px !important;
            width: 100%;
        }

        .btn-bold { 
            background: #38bdf8; 
            color: #000; 
            font-size: 16px; 
            font-weight: 900; 
            padding: 15px; 
            text-transform: uppercase;
            border: none;
            cursor: pointer;
            width: 100%;
        }

        .term-box { 
            background: #000; 
            border: 2px solid #1e293b; 
            padding: 10px; 
            overflow-y: auto; 
            flex-grow: 1;
            font-family: 'Fira Code', monospace;
            font-size: 14px;
        }

        .hidden { display: none; }
        .success-flash { color: #4ade80; font-size: 22px; font-weight: 900; text-shadow: 0 0 10px #22c55e; }
    </style>
</head>
<body>

    <div id="rdpScreen" class="main-container p-4">
        <div class="border-b-2 border-slate-700 pb-2 mb-4 flex justify-between">
            <h1 class="text-white text-lg font-bold tracking-tighter">C9 UZAIR // RDP_GATEWAY</h1>
            <span class="text-sky-500 font-bold">MODE: MANUAL_CONFIG</span>
        </div>
        
        <div class="flex gap-4 h-full overflow-hidden">
            <div class="w-1/2 space-y-4">
                <input type="text" id="vps" placeholder="SERVER IP (e.g. 157.x.x.x)">
                <textarea id="rsa" class="h-24" placeholder="-----BEGIN RSA KEY-----"></textarea>
                <button onclick="goMCR()" class="btn-bold">Establish Secure Link</button>
            </div>
            <div class="w-1/2 bg-black/50 p-3 text-[12px] text-slate-400 font-bold border border-slate-700">
                <p class="text-sky-500 mb-2 underline">System Readiness:</p>
                <div id="rdpLog">Awaiting Master Input...</div>
            </div>
        </div>
    </div>

    <div id="mcrScreen" class="main-container p-4 hidden">
        <div class="border-b-2 border-slate-700 pb-2 mb-4 flex justify-between bg-slate-900 px-2">
            <h1 class="text-white text-lg font-bold">C9 UZAIR // EXTRACTION_CORE</h1>
            <div class="flex gap-4 text-xs font-bold">
                <span class="text-green-500">● TUNNEL_ACTIVE</span>
                <span id="timer" class="text-slate-400">00:00:00</span>
            </div>
        </div>

        <div class="flex gap-4 flex-1 overflow-hidden">
            <div class="w-1/3 flex flex-col gap-4">
                <input type="text" id="target" placeholder="@TikTok_Username" class="border-sky-500">
                <div class="p-3 bg-slate-900 border border-slate-700 rounded text-[11px] font-bold">
                    <p class="text-sky-500 mb-1 underline">Active Modules:</p>
                    <div class="flex justify-between"><span>SSL_BYPASS</span><span class="text-green-500">READY</span></div>
                    <div class="flex justify-between"><span>DB_EXPLOIT</span><span class="text-green-500">READY</span></div>
                </div>
                <button id="runBtn" class="btn-bold bg-green-500" onclick="startHack()">Execute Strike</button>
            </div>

            <div class="w-2/3 flex flex-col bg-black rounded p-2 border-2 border-slate-800">
                <div id="mainTerm" class="term-box">
                    <div class="text-slate-600">RDP Connection Stabilized. Ready for Target.</div>
                </div>
                <div class="mt-2 text-[10px] font-bold text-slate-500 flex justify-between uppercase">
                    <span>Packets: <span id="pkts" class="text-white">0</span></span>
                    <span>C9 ELITE SUITE v21</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        function goMCR() {
            if(!document.getElementById('vps').value) return alert("IP Dalo!");
            const log = document.getElementById('rdpLog');
            log.innerHTML = "<span class='text-sky-400'>Initializing RSA Handshake...</span>";
            
            setTimeout(() => {
                log.innerHTML += "<br><span class='text-white'>RSA Key Verified.</span>";
                setTimeout(() => {
                    log.innerHTML += "<br><span class='text-green-400 font-bold'>RDP Link SUCCESS. Redirecting...</span>";
                    setTimeout(() => {
                        document.getElementById('rdpScreen').classList.add('hidden');
                        document.getElementById('mcrScreen').classList.remove('hidden');
                    }, 1500);
                }, 1000);
            }, 1000);
        }

        function startHack() {
            const tgt = document.getElementById('target').value;
            if(!tgt) return alert("Target ID?");
            const term = document.getElementById('mainTerm');
            const btn = document.getElementById('runBtn');
            
            btn.disabled = true;
            btn.innerText = "EXTRACTING...";
            
            const lines = [
                "Connecting to TikTok CDN Nodes...",
                "Bypassing Akamai WAF Layer...",
                "Searching for UserID: " + tgt,
                "Exploiting Buffer Overflow in /v1/auth",
                "Injecting Malicious Token Fragments...",
                "Bypassing 2FA Verification...",
                "Downloading User Private Key Cluster...",
                "CRITICAL: Accessing Password Database...",
                "<div class='success-flash mt-4'>SUCCESS: PWD [areeba99@&]</div>"
            ];

            let i = 0;
            const runner = setInterval(() => {
                if(i < lines.length) {
                    const d = document.createElement('div');
                    d.className = lines[i].includes('SUCCESS') ? "" : "text-sky-400 mb-1";
                    d.innerHTML = `<span class="text-slate-700">>></span> ${lines[i]}`;
                    term.appendChild(d);
                    term.scrollTop = term.scrollHeight;
                    document.getElementById('pkts').innerText = Math.floor(Math.random()*5000);
                    i++;
                } else {
                    clearInterval(runner);
                    btn.innerText = "MISSION COMPLETE";
                }
            }, 3500);
        }

        setInterval(() => {
            document.getElementById('timer').innerText = new Date().toLocaleTimeString();
        }, 1000);
    </script>
</body>
</html>
