<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_HARD_LINK_V1.8_FIXED</title>
    <style>
        :root { --accent: #00d4ff; --bg: #050608; --panel: #0f1218; --text: #8a929e; --border: #1a1e23; --err: #ff4757; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Consolas', monospace; }
        
        body { 
            background: var(--bg); color: var(--text); 
            height: 100vw; width: 100vh; overflow: hidden; 
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(90deg); transform-origin: center;
        }

        .app-container { display: flex; flex-direction: column; height: 100%; width: 100%; padding: 4px; overflow: hidden; }
        
        /* HEADER - Zero waste space */
        .header-bar { font-size: 10px; color: #fff; padding: 2px 5px; border-bottom: 0.5px solid var(--border); margin-bottom: 2px; }

        .screen { display: none; height: 100%; width: 100%; gap: 4px; overflow: hidden; }
        .active-screen { display: flex !important; }

        /* SPLIT LAYOUT - Left: Logs, Right: Controls */
        .log-section { flex: 1.2; background: #000; border: 0.5px solid var(--border); padding: 5px; font-size: 10px; color: #57606f; overflow-y: auto; line-height: 1.2; height: 92%; }
        .ctrl-section { flex: 1; display: flex; flex-direction: column; gap: 4px; height: 92%; }

        .input-box-alt { background: var(--panel); border: 0.5px solid var(--border); padding: 4px; }
        label { font-size: 8px; color: var(--accent); display: block; margin-bottom: 1px; }
        input { width: 100%; background: #000; border: 0.5px solid #222; color: #fff; padding: 6px; font-size: 12px; font-weight: bold; outline: none; }
        
        /* BIG ACTION BUTTONS */
        .btn { background: none; border: 1.5px solid var(--accent); color: var(--accent); padding: 14px 2px; cursor: pointer; text-transform: uppercase; font-size: 11px; font-weight: 900; width: 100%; margin-top: auto; letter-spacing: 1px; }
        .btn:disabled { border-color: #222; color: #222; opacity: 0.3; }
        .btn-active { background: var(--accent); color: #000; border: none; }

        .loader-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .spinner { width: 30px; height: 30px; border: 2px solid #111; border-top: 2px solid var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
        
        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .blink { animation: blinker 1.5s infinite; }
        @keyframes blinker { 50% { opacity: 0.2; } }

        @media screen and (orientation: landscape) { body { height: 100vh; width: 100vw; transform: none; top: 0; left: 0; } }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div id="loader-text" style="margin-top:10px; font-size:10px; color:var(--accent);" class="blink">NEGOTIATING_UPLINK...</div>
    </div>

    <div class="app-container">
        <div class="header-bar">C9_HARD_LINK_STABLE_V1.8 // <span style="color:var(--accent)">MODE: RDP_MANUAL</span></div>

        <div id="scr-1" class="screen active-screen">
            <div class="log-section" id="log-1">
                > SYSTEM_READY. <br> > Awaiting manual build sequence...
            </div>
            
            <div class="ctrl-section">
                <div class="input-box-alt">
                    <label>SERVER_IP</label><input type="text" value="162.251.10.92">
                </div>
                <div class="input-box-alt">
                    <label>SSH_PORT</label><input type="text" value="22">
                </div>
                <div style="display:flex; flex-direction:column; gap:3px; flex:1;">
                    <button class="btn" id="b1" onclick="runStep1(1)">PING SERVER</button>
                    <button class="btn" id="b2" onclick="runStep1(2)" disabled>GENERATE KEY</button>
                    <button class="btn" id="b3" onclick="runStep1(3)" disabled>ESTABLISH LINK</button>
                    <button class="btn btn-active" id="next-1" style="display:none;" onclick="goTo(2)">ACCESS TERMINAL</button>
                </div>
            </div>
        </div>

        <div id="scr-2" class="screen">
            <div class="log-section" id="target-list">
                [ HW_ID: 0x99FF ] <br> Status: Waiting for mount...
            </div>
            <div class="ctrl-section">
                <div style="background:var(--panel); border:0.5px solid var(--border); padding:10px; display:flex; justify-content:center; flex:1;">
                    <div style="width:70px; height:70px; border:1.5px solid var(--accent); border-radius:50%; position:relative; overflow:hidden;">
                        <div style="width:50%; height:1px; background:var(--accent); position:absolute; top:50%; left:50%; transform-origin:left; animation: rotate 4s linear infinite;"></div>
                    </div>
                </div>
                <button class="btn" id="mount-btn" onclick="runStep2(1)">MOUNT wlan0mon</button>
                <button class="btn" id="scan-btn" onclick="runStep2(2)" disabled>START SCAN</button>
            </div>
        </div>

        <div id="scr-3" class="screen">
            <div class="log-section" id="log-3">
                > Packet Captured: 0x01.cap
            </div>
            <div class="ctrl-section">
                <button class="btn" id="d1" onclick="runStep3(1)">ALLOC_CUDA</button>
                <button class="btn" id="d2" onclick="runStep3(2)" disabled>BRUTE_FORCE</button>
                <div id="crack-status" style="display:none; padding:10px; background:#000; border:0.5px solid var(--border);">
                    <div style="font-size:10px; display:flex; justify-content:space-between; margin-bottom:4px;"><span>SPEED: 21M/s</span><span id="p-val">0%</span></div>
                    <div style="width:100%; height:4px; background:#111;"><div id="p-bar" style="width:0%; height:100%; background:var(--accent);"></div></div>
                </div>
            </div>
        </div>
    </div>

<script>
    const wait = ms => new Promise(res => setTimeout(res, ms));
    const writeLog = (id, msg, col="#57606f") => {
        const b = document.getElementById(id);
        b.innerHTML += `<br><span style="color:${col}">> ${msg}</span>`;
        b.scrollTop = b.scrollHeight;
    }

    async function showLoading(text, time) {
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('loader-text').innerText = text;
        await wait(time);
        document.getElementById('loader').style.display = 'none';
    }

    async function runStep1(s) {
        if(s===1) {
            await showLoading("PINGING...", 1200);
            writeLog('log-1', "Reply from Server: bytes=32 time=12ms", "#fff");
            document.getElementById('b1').style.opacity = "0.3"; document.getElementById('b2').disabled = false;
        } else if(s===2) {
            await showLoading("GEN_KEYS...", 1500);
            writeLog('log-1', "RSA-4096 Pair Generated.", "#00d4ff");
            document.getElementById('b2').style.opacity = "0.3"; document.getElementById('b3').disabled = false;
        } else if(s===3) {
            await showLoading("LINKING...", 2000);
            writeLog('log-1', "Secure Link Active.", "#00ff88");
            document.getElementById('b3').style.display = 'none'; document.getElementById('next-1').style.display = 'block';
        }
    }

    function goTo(n) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen'));
        document.getElementById(`scr-${n}`).classList.add('active-screen');
    }

    async function runStep2(s) {
        if(s===1) {
            await showLoading("MOUNTING...", 1500);
            writeLog('target-list', "rtl8812au mounted successfully.", "#00d4ff");
            document.getElementById('mount-btn').disabled = true; document.getElementById('scan-btn').disabled = false;
        } else if(s===2) {
            await showLoading("SCANNING...", 2500);
            document.getElementById('target-list').innerHTML = `
                <div style="background:#111; border:0.5px solid #222; padding:15px; display:flex; justify-content:space-between; cursor:pointer;" onclick="goTo(3)">
                    <div><b style="font-size:12px;">C9_ENTERPRISE</b><br><small>BSSID: 00:AF:E2</small></div>
                    <div style="color:var(--accent); font-weight:bold;">-38dBm</div>
                </div>`;
        }
    }

    async function runStep3(s) {
        if(s===1) {
            await showLoading("SYNCING...", 1500);
            writeLog('log-3', "CUDA_NODES: ONLINE", "#00d4ff");
            document.getElementById('d1').disabled = true; document.getElementById('d2').disabled = false;
        } else if(s===2) {
            document.getElementById('d2').disabled = true;
            document.getElementById('crack-status').style.display = 'block';
            for(let i=0; i<=95; i+=5) {
                await wait(800);
                document.getElementById('p-bar').style.width = i + "%";
                document.getElementById('p-val').innerText = i + "%";
                writeLog('log-3', `Hash_Seq_${i}: NO_MATCH`);
            }
            writeLog('log-3', "ERROR: GPU_LIMIT_REACHED", "#ff4757");
        }
    }
</script>
</body>
</html>
