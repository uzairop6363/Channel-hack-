<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>C9_OS V100 STABLE</title>
    <style>
        :root { --accent: #00d2ff; --bg: #030305; --panel: #11121a; --text: #8e969f; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: 'SF Pro Display', -apple-system, sans-serif; 
            height: 100vh; width: 100vw; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Top Taskbar */
        .taskbar { 
            height: 44px; background: #000; border-bottom: 1px solid #222; 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 0 20px; z-index: 1000;
        }

        /* Container for all Stages */
        .viewport { flex: 1; position: relative; width: 100%; height: 100%; }

        /* Unified Stage System */
        .stage { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; flex-direction: column; background: var(--bg);
        }
        .active-stage { display: flex !important; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Centered Windows (Login & Config) */
        .win-center { justify-content: center; align-items: center; }
        .win-box { 
            width: 350px; background: var(--panel); border: 1px solid #2a2e38; 
            padding: 30px; border-radius: 8px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        /* Inputs & Buttons */
        input, select { 
            width: 100%; background: #08090d; border: 1px solid #333; 
            color: #fff; padding: 14px; margin: 10px 0; outline: none; border-radius: 5px; font-size: 14px;
        }
        .btn { 
            width: 100%; background: var(--accent); color: #000; border: none; 
            padding: 16px; font-weight: 700; cursor: pointer; text-transform: uppercase; 
            border-radius: 5px; margin-top: 10px;
        }

        /* Forensic Desktop Layout */
        .desktop { display: flex; width: 100%; height: 100%; overflow: hidden; }
        
        /* Left Sidebar */
        .sidebar { 
            width: 220px; background: #08090d; border-right: 1px solid #1a1c24; 
            display: flex; flex-direction: column; overflow-y: auto;
        }
        .nav-btn { 
            padding: 20px 15px; border-bottom: 1px solid #1a1c24; cursor: pointer; 
            font-size: 12px; font-weight: 500; text-align: left; transition: 0.2s;
        }
        .nav-btn:active, .nav-active { background: #14161f; color: var(--accent); border-left: 3px solid var(--accent); }

        /* Right Content Area */
        .content { flex: 1; display: grid; grid-template-rows: 1fr 120px; overflow: hidden; }
        .data-list { padding: 20px; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .terminal { 
            background: #000; border-top: 1px solid #222; padding: 12px; 
            font-family: 'Courier New', monospace; font-size: 11px; color: #4a4d55; overflow-y: auto;
        }

        /* Data Styling */
        .data-item { 
            border-bottom: 1px solid #1a1c24; padding: 12px 0; font-size: 14px; 
            display: flex; justify-content: space-between; align-items: center;
        }
        .data-item b { color: #fff; }
        .blink { animation: blinker 0.8s infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="taskbar">
        <div style="color:var(--accent); font-weight:800; font-size:12px;">C9_UZAIR WORKSTATION V100</div>
        <div style="font-size:10px; color:#444;">SECURITY_LEVEL: OMNI</div>
    </div>

    <div class="viewport">
        
        <div id="st1" class="stage win-center active-stage">
            <div class="win-box">
                <h2 style="color:#fff; font-size:16px; margin-bottom:20px; text-align:center;">SYSTEM LOGIN</h2>
                <input type="text" id="user" placeholder="USERNAME" autocomplete="off">
                <input type="password" id="pass" placeholder="PASSWORD" autocomplete="off">
                <button class="btn" onclick="goToConfig()">AUTHENTICATE</button>
            </div>
        </div>

        <div id="st2" class="stage win-center">
            <div class="win-box" style="width:420px;">
                <h2 style="color:#fff; font-size:16px; margin-bottom:20px; text-align:center;">TARGET PARAMETERS</h2>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <input type="text" id="target" value="192.168.10.45">
                    <input type="text" value="PORT: 4444" readonly>
                </div>
                <select id="vector">
                    <option>Remote Kernel Injection</option>
                    <option>Bluetooth Stack Overrun</option>
                    <option>SS7 Intercept Flow</option>
                </select>
                <button class="btn" onclick="startHackSequence()">EXECUTE ATTACK</button>
            </div>
        </div>

        <div id="st3" class="stage">
            <div class="desktop">
                <div class="sidebar">
                    <div style="padding:15px; font-size:9px; color:#333; letter-spacing:1px;">REMOTE_DUMP_v1</div>
                    <div class="nav-btn nav-active" onclick="fetchData('con', this)">👤 CONTACTS_LIST</div>
                    <div class="nav-btn" onclick="fetchData('wa', this)">💬 WHATSAPP_DB</div>
                    <div class="nav-btn" onclick="fetchData('gps', this)">📍 LIVE_TRACKER</div>
                    <div class="nav-btn" onclick="fetchData('mic', this)">🎙️ MIC_INTERCEPT</div>
                    <div class="nav-btn" onclick="fetchData('sms', this)">✉️ SMS_DUMP</div>
                    <div style="margin-top:auto; padding:15px; font-size:9px; color:#222; text-align:center;">ARCHITECT: C9 UZAIR</div>
                </div>

                <div class="content">
                    <div class="data-list" id="display-area">
                        </div>
                    <div class="terminal" id="term-logs">
                        > C9_OS Kernel Active... <br>
                        > Waiting for remote handshake...
                    </div>
                </div>
            </div>
        </div>

    </div>

<script>
    // Utility to switch stages safely
    function switchStage(toId) {
        document.querySelectorAll('.stage').forEach(s => s.classList.remove('active-stage'));
        document.getElementById(toId).classList.add('active-stage');
    }

    function goToConfig() {
        const u = document.getElementById('user').value;
        const p = document.getElementById('pass').value;
        if(u === 'admin' && p === 'c9uzair') {
            switchStage('st2');
        }
    }

    async function startHackSequence() {
        const ip = document.getElementById('target').value;
        switchStage('st3');
        
        const logs = document.getElementById('term-logs');
        const display = document.getElementById('display-area');
        
        display.innerHTML = `<div class="blink" style="color:var(--accent); text-align:center; padding-top:50px;">INITIALIZING EXPLOIT...</div>`;

        const steps = [
            `Scanning Node: ${ip}... FOUND`,
            `Injecting Payload via Vector: ${document.getElementById('vector').value}`,
            `Bypassing Secure Enclave... SUCCESS`,
            `Escalating Privileges... UID_0 (ROOT) OBTAINED`,
            `Handshake Stable. Syncing Remote Databases...`
        ];

        for(let step of steps) {
            await new Promise(r => setTimeout(r, 1500));
            logs.innerHTML += `<br>> ${step}`;
            logs.scrollTop = logs.scrollHeight;
        }

        fetchData('con', document.querySelector('.nav-btn.nav-active'));
    }

    function fetchData(type, element) {
        // Handle Active Tabs
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('nav-active'));
        element.classList.add('nav-active');

        const display = document.getElementById('display-area');
        display.innerHTML = `<div class="blink" style="font-size:12px;">DECRYPTING BLOB_DATA...</div>`;

        const names = ["Zeeshan", "Bilal", "Ammi", "Abbu", "Sajid", "Waqas", "Hamza", "Tayyab", "Kamran", "Umer", "Ali", "Hassan", "Kashif"];

        setTimeout(() => {
            display.innerHTML = "";
            if(type === 'gps') {
                display.innerHTML = `<div style="height:160px; background:#000; border:1px solid #222; position:relative; border-radius:10px;"><div style="width:12px; height:12px; background:red; border-radius:50%; position:absolute; top:40%; left:50%; box-shadow:0 0 15px red;" class="blink"></div><p style="padding:15px; font-size:11px;">LOC: KARACHI, PK (GULSHAN)</p></div>`;
            } else if(type === 'mic') {
                display.innerHTML = `<div style="text-align:center; padding-top:60px;"><h1 style="color:red; font-size:32px;" class="blink">● LIVE</h1><p style="color:#444;">Bitrate: 256kbps | Stream: Encrypted</p></div>`;
            } else {
                for(let i=1; i<=30; i++) {
                    const row = document.createElement('div');
                    row.className = 'data-item';
                    if(type === 'con') row.innerHTML = `<span>${names[i%names.length]}</span> <b>+92 3${Math.floor(100000000+Math.random()*900000000)}</b>`;
                    else if(type === 'wa') row.innerHTML = `<span>${names[Math.floor(Math.random()*names.length)]}</span> <b>"Bhai wo kaam ho gaya."</b>`;
                    else if(type === 'sms') row.innerHTML = `<span>BANK_AUTH</span> <b>OTP: ${Math.floor(1000+Math.random()*9000)}</b>`;
                    display.appendChild(row);
                }
            }
        }, 1200);
    }
</script>
</body>
</html>
